apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: froystein-jp-canonical-redirect
spec:
  parentRefs:
    - name: eg-public
      namespace: envoy-gateway-system
  hostnames:
    - froystein.jp
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            hostname: www.froystein.jp
            statusCode: 301
